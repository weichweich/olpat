name: Continuous integration

on:
  push:
    branches:
      - main
    tags:
      - release-*
    paths-ignore:
      - "site/**/*"
      - schemas/**/*
      - util/**/*
  workflow_dispatch: {}
  pull_request:
    branches:
      - main

jobs:
  cargo-deny:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
    - uses: EmbarkStudios/cargo-deny-action@v2
      with:
        arguments: --all-features --workspace
        command-arguments: --hide-inclusion-graph

  fmt:
    name: Check formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install latest Rust toolchain
        run: |
          rustup toolchain install nightly --profile minimal
          rustup component add --toolchain nightly rustfmt
      - name: Check fmt
        run: cargo +nightly fmt

  test:
    name: Test on Rust stable
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install latest Rust toolchain
        run: rustup update --no-self-update
      - uses: Swatinem/rust-cache@v2
      - name: Test olpat
        run: cargo test -p olpat
      - name: Check formatting regression
        run: cargo run -- fmt --check
      - name: Check if git index is clean
        run: git diff-index --quiet HEAD --

  toml_test:
    name: Run toml-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install latest Rust toolchain
        run: |
          rustup update --no-self-update
      - uses: Swatinem/rust-cache@v2
      - name: Retrieve toml-test
        run: |
          wget https://github.com/toml-lang/toml-test/releases/download/v2.1.0/toml-test-v2.1.0-linux-amd64.gz
          gunzip toml-test-v2.1.0-linux-amd64.gz
          chmod +x toml-test-v2.1.0-linux-amd64
      - name: Build olpat-cli
        run: |
          cargo build --bin olpat --no-default-features --features "rustls-tls,toml-test"
      - name: Run toml-test
        run: ./toml-test-v2.1.0-linux-amd64 test -toml 1.1 -skip 'invalid/control/cr,invalid/control/multi-cr,invalid/control/rawmulti-cr,invalid/table/append-with-dotted-keys-04,invalid/table/super-twice,valid/array/array,valid/comment/everywhere,valid/comment/nonascii,valid/datetime/datetime,valid/datetime/edge,valid/datetime/leap-year,valid/datetime/local,valid/datetime/local-date,valid/datetime/local-time,valid/datetime/milliseconds,valid/datetime/no-seconds,valid/datetime/timezone,valid/example,valid/key/numeric-04,valid/key/quoted-unicode,valid/spec-1.1.0/common-12,valid/spec-1.1.0/common-27,valid/spec-1.1.0/common-28,valid/spec-1.1.0/common-29,valid/spec-1.1.0/common-30,valid/spec-1.1.0/common-31,valid/spec-1.1.0/common-32,valid/spec-1.1.0/common-33,valid/spec-1.1.0/common-34,valid/spec-1.1.0/common-44,valid/spec-example-1,valid/spec-example-1-compact,valid/string/escape-esc,valid/string/hex-escape,valid/string/quoted-unicode' -decoder "./target/debug/olpat toml-test"

  test-msrv-lib:
    name: Test libraries with MSRV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install latest Rust toolchain
        run: |
          rustup update --no-self-update
          rustup default 1.88
      - uses: Swatinem/rust-cache@v2
      - name: Test MSRV for olpat
        run: |
          cargo check -p olpat-lsp-async-stub -p olpat-common -p olpat-lsp -p olpat
          cargo test  -p olpat-lsp-async-stub -p olpat-common -p olpat-lsp -p olpat

  test-msrv-bin:
    name: Test binaries with MSRV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install latest Rust toolchain
        run: |
          rustup update --no-self-update
          rustup default 1.88
      - uses: Swatinem/rust-cache@v2
      - name: Test olpat-cli
        run: |
          cargo check -p olpat-cli
          cargo test  -p olpat-cli
